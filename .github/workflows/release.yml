name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with ZIP
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Évite de recréer une release qui existe déjà (ex: push sans changeset)
          if gh release view "v${VERSION}" 2>/dev/null; then
            echo "Release v${VERSION} already exists, skipping."
            exit 0
          fi

          pnpm build

          PLUGIN_NAME="dcx-benchmark-luxe-plugin"
          ZIP_NAME="dcx-benchmark-luxe-${VERSION}.zip"

          mkdir -p "${PLUGIN_NAME}"
          cp dcx-benchmark-luxe-plugin.php "${PLUGIN_NAME}/"
          cp README.md "${PLUGIN_NAME}/"
          cp -r includes/ "${PLUGIN_NAME}/includes/"
          cp -r assets/ "${PLUGIN_NAME}/assets/"
          cp -r build/ "${PLUGIN_NAME}/build/"
          cp composer.json "${PLUGIN_NAME}/"
          cp -r vendor/ "${PLUGIN_NAME}/vendor/"

          zip -r "$ZIP_NAME" "${PLUGIN_NAME}/" -x "*.DS_Store"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file CHANGELOG.md \
            "$ZIP_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
